name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: second-opinion-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: second-opinion-darwin-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: second-opinion-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: second-opinion-linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: target/${{ matrix.target }}/release/second-opinion

  release:
    name: Bundle binaries and create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: skills/second-opinion/scripts/bin/
          merge-multiple: false

      - name: Rename and chmod binaries
        run: |
          for dir in skills/second-opinion/scripts/bin/*/; do
            name=$(basename "$dir")
            mv "$dir/second-opinion" "skills/second-opinion/scripts/bin/$name"
            chmod +x "skills/second-opinion/scripts/bin/$name"
            rmdir "$dir"
          done
          ls -lh skills/second-opinion/scripts/bin/

      - name: Commit binaries to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/second-opinion/scripts/bin/
          git commit -m "chore: bundle binaries for ${{ github.ref_name }}"
          git push origin master

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: skills/second-opinion/scripts/bin/second-opinion-*
          generate_release_notes: true
