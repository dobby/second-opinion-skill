<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 220px;
      padding: 16px;
      margin: 0;
      background: #fff;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #22c55e; }
    .dot.disconnected { background: #ef4444; }
    h3 {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 600;
      color: #111;
    }
    .label { color: #374151; }
  </style>
</head>
<body>
  <h3>Second Opinion</h3>
  <div class="status">
    <div class="dot disconnected" id="dot"></div>
    <span class="label" id="label">Server not running</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
